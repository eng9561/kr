<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국농어촌공사 직무지식 시험</title>
    <style>
        :root {
            --primary-color: #004d99;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .question-card {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.2s ease;
        }

        .question-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1a252f;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-item label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-item label:hover {
            background: #e9ecef;
        }

        .option-item input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: #003366;
        }

        /* 결과 화면 스타일 */
        #result-screen {
            display: none;
        }

        .score-board {
            text-align: center;
            background: #e9f2ff;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .score-num {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .badge-correct { background-color: var(--success-color); }
        .badge-wrong { background-color: var(--danger-color); }

        /* 결과 페이지용 보기 스타일 */
        .res-option-item {
            padding: 10px 15px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            margin-bottom: 8px;
            background: #f8f9fa;
        }

        .res-option-item.correct-target {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }

        .res-option-item.user-wrong {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }

        .explanation-box {
            margin-top: 15px;
            padding: 12px 15px;
            background-color: #f1f3f5;
            border-left: 4px solid var(--primary-color);
            font-size: 0.95rem;
        }

        .restart-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #6c757d;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

        <button type="button" class="submit-btn" onclick="submitQuiz()">제출하기</button>

    // 페이지 로드 시 문제 렌더링
    window.onload = function() {
        const container = document.getElementById('questions-container');
        
        quizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            let optionsHtml = '';
            q.options.forEach((opt, optIndex) => {
                optionsHtml += `
                    <li class="option-item">
                        <label>
                            <input type="checkbox" name="q_${index}" value="${optIndex}" onclick="limitSingleCheckbox(this, 'q_${index}')">
                            ${optIndex + 1}) ${opt}
                        </label>
                    </li>
                `;
            });

            card.innerHTML = `
                <div class="question-title">[문제 ${index + 1}] ${q.q}</div>
                <ul class="options-list">${optionsHtml}</ul>
            `;
            container.appendChild(card);
        });
    };

    // 체크박스 중복 선택 방지 (단일 선택 구현)
    function limitSingleCheckbox(checkbox, groupName) {
        const checkboxes = document.getElementsByName(groupName);
        checkboxes.forEach((cb) => {
            if (cb !== checkbox) cb.checked = false;
        });
    }

    // 채점 및 결과 출력 (정답 페이지 내 보기 전체 출력 로직 반영)
    function submitQuiz() {
        let correctCount = 0;
        const resultContainer = document.getElementById('result-details');
        resultContainer.innerHTML = '';

        quizData.forEach((q, index) => {
            const selectedBoxes = document.querySelectorAll(`input[name="q_${index}"]:checked`);
            let userAns = selectedBoxes.length > 0 ? parseInt(selectedBoxes[0].value) : -1;

            const isCorrect = userAns === q.ans;
            if (isCorrect) correctCount++;

            // 결과용 보기 리스트 생성
            let resOptionsHtml = '';
            q.options.forEach((opt, optIndex) => {
                let statusClass = '';
                let statusLabel = '';

                if (optIndex === q.ans) {
                    statusClass = 'correct-target';
                    statusLabel = userAns === q.ans ? ' ⭕ (내 선택 - 정답)' : ' 👈 (정답)';
                } else if (optIndex === userAns) {
                    statusClass = 'user-wrong';
                    statusLabel = ' ❌ (내 선택 - 오답)';
                }

                resOptionsHtml += `
                    <div class="res-option-item ${statusClass}">
                        ${optIndex + 1}) ${opt}${statusLabel}
                    </div>
                `;
            });

            // 결과 문제 카드 생성
            const resCard = document.createElement('div');
            resCard.className = 'question-card';

            const badgeClass = isCorrect ? 'badge-correct' : 'badge-wrong';
            const badgeText = isCorrect ? '정답 ⭕' : '오답 ❌';

            resCard.innerHTML = `
                <div>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="question-title">[문제 ${index + 1}] ${q.q}</div>
                <div class="options-list" style="margin-bottom: 12px;">
                    ${resOptionsHtml}
                </div>
                <div class="explanation-box">
                    <strong>💡 해설:</strong> ${q.exp}
                </div>
            `;
            resultContainer.appendChild(resCard);
        });

        // 점수 계산 (100점 만점 기준)
        const finalScore = Math.round((correctCount / quizData.length) * 100);

        document.getElementById('score-text').innerText = `${finalScore}점`;
        document.getElementById('score-details').innerText = `총 ${quizData.length}문제 중 ${correctCount}문제를 맞히셨습니다.`;

        // 화면 전환
        document.getElementById('quiz-form').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        // 최상단으로 스크롤 이동
        window.scrollTo(0, 0);
    }
</script>
